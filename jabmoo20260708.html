          </div>
        </div>

        {/* ── RIGHT: pl[1] + chat panel ── */}
        <div style={{width:chatOpen?Math.round(160*sf):Math.round(68*sf),flexShrink:0,display:"flex",flexDirection:"column",background:"rgba(255,255,255,0.06)",borderLeft:"1px solid rgba(255,255,255,0.07)",transition:"width 0.2s"}}>
          {/* pl[1] strip */}
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"4px 3px",gap:3,flexShrink:0}}>
            <div style={{fontSize:10,fontWeight:700,color:S.curIdx===1?"#60a5fa":"#94a3b8",textAlign:"center",wordBreak:"break-word",lineHeight:1.2}}>{pl[1].name}</div>
            <SCP wc={S.wonCards[1]} vert={true}/>
            <OppCards count={S.hands[1].length} rot={true} max={13}/>
          </div>
          {/* chat panel */}
          {chatOpen&&net&&(
            <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:0,borderTop:"1px solid rgba(255,255,255,0.07)"}}>
              <div style={{flex:1,overflowY:"auto",padding:"4px 6px",display:"flex",flexDirection:"column",gap:3}}>
                {chatMsgs.length===0&&<div style={{fontSize:10,color:"#475569",textAlign:"center",marginTop:20}}>{L?"ยังไม่มีข้อความ":"No messages"}</div>}
                {chatMsgs.map((m,i)=>(
                  <div key={i} style={{fontSize:10,wordBreak:"break-word"}}>
                    <span style={{fontWeight:700,color:m.id===myId?"#60a5fa":"#94a3b8"}}>{m.name}: </span>
                    <span style={{color:"#cbd5e1"}}>{m.text}</span>
                  </div>
                ))}
                <div ref={chatEndRef}/>
              </div>
              <div style={{display:"flex",gap:3,padding:"4px 5px",borderTop:"1px solid rgba(255,255,255,0.07)"}}>
                <input value={chatIn} onChange={e=>setChatIn(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")sendChat();}} placeholder={L?"พิมพ์…":"msg…"} style={{flex:1,background:"rgba(255,255,255,0.08)",border:"1px solid #334155",borderRadius:5,padding:"4px 6px",fontSize:10,color:"#e2e8f0",outline:"none"}}/>
                <button onClick={sendChat} style={{padding:"4px 7px",background:"#2563eb",border:"none",borderRadius:5,color:"#fff",fontSize:10,cursor:"pointer"}}>{L?"ส่ง":"→"}</button>
              </div>
            </div>
          )}
        </div>
      </div>

      {/* ── PORTRAIT ROTATE HINT (in-game only) ── */}
      {portrait&&(
        <div style={{position:"fixed",inset:0,background:"rgba(15,32,39,0.97)",zIndex:400,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14,padding:"2rem",textAlign:"center"}}>
          <div style={{fontSize:48}}>🔄</div>
          <div style={{fontSize:15,color:"#e2e8f0",fontWeight:600,lineHeight:1.5}}>{L?"หมุนมือถือเป็นแนวนอนเพื่อเล่น":"Rotate your phone to landscape to play"}</div>
          <button onClick={fsToggle} style={{padding:"10px 20px",background:"#2563eb",border:"none",borderRadius:10,color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}}>⛶ {L?"เต็มจอ + ล็อกแนวนอน":"Fullscreen + lock landscape"}</button>
        </div>
      )}

      {/* ── SCORE HISTORY MODAL ── */}
      {showHist&&(
        <div onClick={()=>setShowHist(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#1e293b",borderRadius:12,padding:"1rem",maxWidth:360,width:"100%",maxHeight:"80vh",overflowY:"auto",boxShadow:"0 8px 32px rgba(0,0,0,0.4)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <span style={{fontSize:14,fontWeight:700,color:"#e2e8f0"}}>📊 {L?"ประวัติคะแนน":"Score History"}</span>
              <button onClick={()=>setShowHist(false)} style={{fontSize:16,border:"none",background:"none",cursor:"pointer",color:"#64748b"}}>✕</button>
            </div>
            {histRef.current.length===0&&<div style={{color:"#475569",textAlign:"center",padding:"1rem",fontSize:12}}>{L?"ยังไม่มีข้อมูล":"No data yet"}</div>}
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
              <thead>
                <tr>
                  <th style={{padding:"4px 6px",textAlign:"left",color:"#64748b",borderBottom:"1px solid #334155"}}>{L?"เกม":"G"}</th>
                  {pl.map((p,i)=><th key={i} style={{padding:"4px 6px",textAlign:"right",color:"#64748b",borderBottom:"1px solid #334155"}}>{p.name}</th>)}
                </tr>
              </thead>
              <tbody>
                {histRef.current.map((row,ri)=>(
                  <tr key={ri} style={{borderBottom:"1px solid #1e293b"}}>
                    <td style={{padding:"4px 6px",color:"#94a3b8",fontWeight:600}}>{row.game}</td>
                    {row.scores.map((sc,si)=>(
                      <td key={si} style={{padding:"4px 6px",textAlign:"right",fontWeight:700,color:sc>0?"#4ade80":sc<0?"#f87171":"#64748b"}}>{sc>0?"+":""}{sc}</td>
                    ))}
                  </tr>
                ))}
                {histRef.current.length>0&&(
                  <tr style={{borderTop:"2px solid #334155"}}>
                    <td style={{padding:"4px 6px",color:"#e2e8f0",fontWeight:700}}>{totalTxt}</td>
                    {S.totals.map((t,ti)=>(
                      <td key={ti} style={{padding:"4px 6px",textAlign:"right",fontWeight:700,color:t>0?"#4ade80":t<0?"#f87171":"#64748b"}}>{t>0?"+":""}{t}</td>
                    ))}
                  </tr>
                )}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );

  return PortraitView();

  function PortraitView(){
  const vw=(typeof window!=="undefined"?window.innerWidth:375);
  const vh=(typeof window!=="undefined"?window.innerHeight:667);
  const shortSide=Math.min(vw,vh);
  const sf=Math.min(Math.max(shortSide/375,1.0),2.2);
  const tW=Math.round(42*sf), tH=Math.round(60*sf);
  const PNL="rgba(255,255,255,0.88)";
  const BRD="rgba(0,0,0,0.08)";
  const TXT="rgba(30,30,60,0.85)";
  const TXT2="rgba(30,30,60,0.45)";
  const SP=[
    {bottom:"0%",left:"50%",transform:"translateX(-50%)"},
    {right:"0%",top:"50%",transform:"translateY(-50%)"},
    {top:"0%",left:"50%",transform:"translateX(-50%)"},
    {left:"0%",top:"50%",transform:"translateY(-50%)"},
  ];
  const title=L?"จับหมู":"Jab Moo";
  const round=L?"เกม":"Game";
  const trickL=L?"ตา":"Trick";
  const last=L?"สุดท้าย!":"Last!";
  const yourTurn=L?"ถึงตาคุณ!":"Your turn!";
  const wait=L?"รอ":"Wait";
  const playTxt=L?"เล่น":"Play";
  const cancelTxt=L?"ยกเลิก":"Cancel";
  const totalTxt=L?"รวม":"Total";
  const curTxt=L?"เกมนี้":"Now";

  return (
    <div className="vh100" style={{width:"100vw",background:"#f0f1f3",display:"flex",flexDirection:"column",overflow:"hidden",userSelect:"none"}}>
      <Overlays/><EmoteFab/>
      <div style={{background:PNL,padding:"5px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid "+BRD,flexShrink:0,height:40,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
        <span style={{fontSize:17,fontWeight:700,color:"#1e3a5f",fontFamily:"Georgia,serif"}}>🐷 {title}</span>
        <div style={{display:"flex",gap:4,background:"#f3f4f6",borderRadius:7,padding:2}}>
          {["th","en"].map(l=>(
            <button key={l} onClick={()=>setLang(l)} style={{fontSize:11,padding:"2px 9px",borderRadius:5,border:"none",cursor:"pointer",background:lang===l?"#3b82f6":"transparent",color:lang===l?"#fff":"#6b7280"}}>{l.toUpperCase()}</button>
          ))}
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <span style={{fontSize:12,color:S.trickNum>=13?"#dc2626":"#6b7280",fontWeight:600}}>
            {round} {S.gameNum} · {trickL} {S.trickNum}/13{S.trickNum>=13?" "+last:""}
          </span>
          <button onClick={()=>setOrient("landscape")} style={{fontSize:11,padding:"2px 7px",borderRadius:5,border:"1px solid #d1d5db",background:"#fff",color:"#6b7280",cursor:"pointer"}}>🔄</button>
          {net&&<button onClick={()=>{if(chatOpen){setChatOpen(false);}else{openChat();}}} style={{fontSize:11,padding:"2px 7px",borderRadius:5,border:"1px solid #d1d5db",background:chatOpen?"#2563eb":"#fff",color:chatOpen?"#fff":"#6b7280",cursor:"pointer",position:"relative"}}>
            💬{unread>0&&!chatOpen&&<span style={{position:"absolute",top:-5,right:-5,background:"#ef4444",color:"#fff",borderRadius:9,fontSize:8,padding:"0 3px",fontWeight:700}}>{unread}</span>}
          </button>}
          <button onClick={()=>setShowHist(true)} style={{fontSize:11,padding:"2px 7px",borderRadius:5,border:"1px solid #d1d5db",background:"#fff",color:"#6b7280",cursor:"pointer"}}>📊</button>
          <button onClick={()=>{
            const log=gameLogRef.current.join("\n");
            const txt=log||"(ยังไม่มีข้อมูล)";
            if(navigator.clipboard&&navigator.clipboard.writeText){
              navigator.clipboard.writeText(txt).then(()=>setCopyMsg(true)).catch(()=>setCopyMsg(true));
            }else{setCopyMsg(true);}
            setTimeout(()=>setCopyMsg(false),1500);
          }} style={{fontSize:11,padding:"2px 7px",borderRadius:5,border:"1px solid #d1d5db",background:"#fff",color:"#6b7280",cursor:"pointer"}}>📋</button>
          {copyMsg && <span style={{fontSize:10,color:"#16a34a",fontWeight:600}}>✓</span>}
        </div>
      </div>

      <div style={{background:PNL,display:"flex",borderBottom:"1px solid "+BRD,flexShrink:0}}>
        {pl.map((p,i)=>(
          <div key={i} style={{flex:1,textAlign:"center",padding:"4px 2px",borderLeft:i>0?"1px solid "+BRD:"none",background:i===S.curIdx?"#eff6ff":"transparent"}}>
            <div style={{fontSize:13,fontWeight:700,color:i===S.curIdx?"#1d4ed8":TXT,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",padding:"0 2px"}}><span style={{display:"inline-block",width:8,height:8,borderRadius:4,background:SEATCOL[i],marginRight:3,verticalAlign:"middle"}}/>{p.name}{i===0?" ★":""}</div>
            <div style={{fontSize:15,fontWeight:700,color:S.totals[i]>0?"#059669":S.totals[i]<0?"#dc2626":"#374151"}}>{S.totals[i]>0?"+":""}{S.totals[i]}</div>
            <div style={{fontSize:15,fontWeight:700,color:cgS[i]>0?"#0891b2":cgS[i]<0?"#e11d48":"#9ca3af"}}>{cgS[i]>0?"+":""}{cgS[i]}</div>
            <div style={{fontSize:10,color:"#9ca3af"}}>{totalTxt}/{curTxt}</div>
          </div>
        ))}
      </div>

      <div style={{display:"flex",flexDirection:"row",alignItems:"stretch",background:PNL,borderBottom:"1px solid "+BRD,flexShrink:0}}>
        <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"4px 8px 4px"}}>
          <div style={{fontSize:14,fontWeight:700,color:S.curIdx===2?"#1d4ed8":TXT}}>{pl[2].name}</div>
          <div style={{display:"flex",width:"100%",alignItems:"center",gap:0,justifyContent:"center"}}>
            {S.wonCards[2].filter(c=>isSC(c)).length>0 && <SCP wc={S.wonCards[2]} vert={false}/>}
            <div style={{display:"flex",justifyContent:"center",overflow:"hidden"}}>
              {S.hands[2].map((_,i)=><div key={i} style={{marginLeft:i>0?Math.max(-Math.round(28*sf),-(Math.round(28*sf)*(13-1))/(Math.max(S.hands[2].length,1))):0,flexShrink:1}}><CB w={Math.round(28*sf)} h={Math.round(40*sf)}/></div>)}
            </div>
          </div>
        </div>
        {aiThinking && (
          <div style={{display:"flex",alignItems:"center",padding:"4px 6px",borderLeft:"1px solid "+BRD,minWidth:0}}>
            <div style={{background:"rgba(30,30,60,0.9)",borderRadius:10,padding:"5px 10px",display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:14}}>🤖</span>
              <span style={{fontSize:12,color:"#93c5fd",fontWeight:700,whiteSpace:"nowrap"}}>AI...</span>
            </div>
          </div>
        )}
      </div>

      <div style={{flex:1,display:"flex",flexDirection:"row",overflow:"hidden",minHeight:0}}>
        <div style={{width:Math.round(80*Math.min(sf,1.5)),display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"6px 3px",background:PNL,borderRight:"1px solid "+BRD}}>
          <div style={{fontSize:14,fontWeight:700,color:S.curIdx===3?"#1d4ed8":TXT,textAlign:"center",wordBreak:"break-word",lineHeight:1.2,marginBottom:4}}>{pl[3].name}</div>
          <SCP wc={S.wonCards[3]} vert={true}/>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginTop:8}}>
            {S.hands[3].map((_,i)=>(
              <div key={i} style={{marginTop:i>0?-Math.round(40*sf):0}}><CB w={Math.round(30*sf)} h={Math.round(44*sf)} rot={90}/></div>
            ))}
          </div>
        </div>

        <div style={{flex:1,position:"relative",display:"flex",alignItems:"center",justifyContent:"center",minHeight:0,background:"linear-gradient(135deg,#2a7a50,#35956a,#2a7a50)",overflow:"visible",zIndex:1}}>
          {S.toast.msg ? (
            <div style={{position:"absolute",top:"34%",left:"50%",transform:"translate(-50%,-50%)",background:"rgba(30,30,60,0.92)",borderRadius:20,padding:"5px 14px",zIndex:30,whiteSpace:"nowrap",boxShadow:"0 2px 10px rgba(0,0,0,0.25)",pointerEvents:"none",textAlign:"center",maxWidth:"60%",overflow:"hidden",textOverflow:"ellipsis"}}>
              <span style={{fontSize:13,color:"#fff",fontWeight:700}}>{S.toast.msg}</span>
            </div>
          ) : ls ? (
            <div style={{position:"absolute",top:"34%",left:"50%",transform:"translate(-50%,-50%)",background:"rgba(255,255,255,0.95)",borderRadius:20,padding:"4px 14px",zIndex:30,whiteSpace:"nowrap",boxShadow:"0 2px 8px rgba(0,0,0,0.15)",pointerEvents:"none"}}>
              <span style={{fontSize:13,color:"#1e3a5f",fontWeight:700}}>{pl[S.leadIdx].name}</span>
              <span style={{fontSize:12,color:"#9ca3af"}}> lead </span>
              <span style={{fontSize:20,fontWeight:800,color:SC(ls)==="#1a1a2e"?"#1a1a2e":SC(ls)}}>{ls}</span>
            </div>
          ) : null}
          {S.phase==="roundSummary" && S.roundScores && (
            <div style={{position:"absolute",inset:0,zIndex:50,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.5)"}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gridTemplateRows:"1fr 1fr 1fr",gap:6,width:"90%",height:"85%",maxWidth:300,maxHeight:260}}>
                {Array(9).fill(null).map((_,idx)=>{
                  const row=Math.floor(idx/3), col=idx%3;
                  let pi=-1;
                  if(row===0&&col===1)pi=2;
                  if(row===1&&col===0)pi=3;
                  if(row===1&&col===2)pi=1;
                  if(row===2&&col===1)pi=0;
                  if(pi===-1)return <div key={idx}/>;
                  const sc=S.roundScores[pi];
                  const col2=sc>0?"#059669":sc<0?"#dc2626":"#6b7280";
                  return(
                    <div key={idx} style={{background:"rgba(255,255,255,0.95)",borderRadius:10,padding:"6px 4px",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",boxShadow:"0 2px 10px rgba(0,0,0,0.25)"}}>
                      <div style={{fontSize:11,fontWeight:700,color:"#374151",marginBottom:2,textAlign:"center",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",width:"100%"}}>{pl[pi].name}</div>
                      <div style={{fontSize:26,fontWeight:900,color:col2,lineHeight:1}}>{sc>0?"+":""}{sc}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
          <div style={{position:"relative",width:"calc(100% - 16px)",height:"calc(100% - 16px)"}}>
            {[0,1,2,3].map(pi=>{
              const played=S.trick.find(x=>x.playerIdx===pi);
              const myTurn=pi===S.curIdx&&S.phase==="playing";
              const isLead=S.trick.length>0&&S.trick[0].playerIdx===pi;
              return (
                <div key={pi} style={{position:"absolute",...SP[pi],display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                  {played
                    ? <CF card={played.card} dis={true} w={tW} h={tH} lead={isLead} trick={true}/>
                    : myTurn
                      ? <div style={{width:tW,height:tH,borderRadius:7,border:"2.5px dashed #facc15",display:"flex",alignItems:"center",justifyContent:"center",color:"#facc15",fontSize:22,background:"rgba(250,204,21,0.10)"}}>?</div>
                      : <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                          <CB w={tW} h={tH}/>
                          <span style={{fontSize:13,fontWeight:600,color:TXT2}}>{wait}</span>
                        </div>
                  }
                </div>
              );
            })}
          </div>
        </div>

        <div style={{width:Math.round(80*Math.min(sf,1.5)),display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"6px 3px",background:PNL,borderLeft:"1px solid "+BRD}}>
          <div style={{fontSize:14,fontWeight:700,color:S.curIdx===1?"#1d4ed8":TXT,textAlign:"center",wordBreak:"break-word",lineHeight:1.2,marginBottom:4}}>{pl[1].name}</div>
          <SCP wc={S.wonCards[1]} vert={true}/>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginTop:8}}>
            {S.hands[1].map((_,i)=><div key={i} style={{marginTop:i>0?-40:0}}><CB w={30} h={44} rot={90}/></div>)}
          </div>
        </div>
      </div>

      <div style={{background:PNL,borderTop:"1px solid "+BRD,padding:"5px 8px calc(8px + env(safe-area-inset-bottom))",flexShrink:0,boxShadow:"0 -2px 8px rgba(0,0,0,0.06)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4,flexWrap:"wrap",gap:4}}>
          <span style={{fontSize:14,fontWeight:700,color:S.curIdx===0?"#1d4ed8":TXT}}>{pl[0].name} ★</span>
          <SCP wc={S.wonCards[0]} vert={false}/>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            {S.curIdx===0&&S.phase==="playing" && <span style={{fontSize:13,color:"#059669",fontWeight:700}}>{yourTurn}</span>}
            <span style={{fontSize:11,color:"#9ca3af"}}>{S.hands[0].length} ใบ</span>
          </div>
        </div>
        <HandCards hands0={S.hands[0]} ls={ls} trick={S.trick} curIdx={S.curIdx} phase={S.phase} selected={S.selected} ap={ap}/>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>ap({type:"SEL",val:null})} style={{padding:"9px 14px",background:"#f3f4f6",border:"1px solid #d1d5db",borderRadius:8,fontSize:13,color:"#6b7280",cursor:"pointer"}}>{cancelTxt}</button>
          <button onClick={humanPlay} style={{flex:1,padding:10,background:S.curIdx===0&&S.phase==="playing"?"#2563eb":"#e5e7eb",border:"none",borderRadius:8,fontSize:14,fontWeight:700,color:S.curIdx===0&&S.phase==="playing"?"#fff":"#9ca3af",cursor:S.curIdx===0&&S.phase==="playing"?"pointer":"default"}}>
            {S.selected!==null&&S.hands[0][S.selected]?(playTxt+" "+S.hands[0][S.selected].rank+S.hands[0][S.selected].suit):playTxt}
          </button>
        </div>
        {S.errMsg && <div style={{fontSize:12,color:"#dc2626",textAlign:"center",marginTop:5}}>{S.errMsg}</div>}
      </div>
      {chatOpen&&net&&(
        <div style={{position:"fixed",left:0,right:0,bottom:0,zIndex:280,background:"#fff",borderTop:"2px solid #2563eb",borderRadius:"14px 14px 0 0",boxShadow:"0 -4px 20px rgba(0,0,0,0.2)",display:"flex",flexDirection:"column",height:"42vh",paddingBottom:"env(safe-area-inset-bottom)"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 12px",borderBottom:"1px solid #e5e7eb"}}>
            <span style={{fontSize:13,fontWeight:700,color:"#1e3a5f"}}>💬 {L?"แชต":"Chat"}</span>
            <button onClick={()=>setChatOpen(false)} style={{fontSize:16,border:"none",background:"none",cursor:"pointer",color:"#6b7280"}}>✕</button>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"6px 12px",display:"flex",flexDirection:"column",gap:4}}>
            {chatMsgs.length===0&&<div style={{fontSize:12,color:"#9ca3af",textAlign:"center",marginTop:30}}>{L?"ยังไม่มีข้อความ":"No messages"}</div>}
            {chatMsgs.map((m,i)=>(
              <div key={i} style={{fontSize:13,wordBreak:"break-word"}}>
                <span style={{fontWeight:700,color:m.id===myId?"#2563eb":"#1e3a5f"}}>{m.name}: </span>
                <span style={{color:"#374151"}}>{m.text}</span>
              </div>
            ))}
            <div ref={chatEndRef}/>

// ── ONLINE: TRANSPORT LAYER ─────────────────────────────────────
// Common interface: make(...) -> { send(type,payload), close(), offline }
// MockTransport = BroadcastChannel (same-origin tabs). SupabaseTransport = cross-device.
function rndId(){return Math.random().toString(36).slice(2,9);}
function rndRoom(){let s="";const A="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";for(let i=0;i<4;i++)s+=A[0|Math.random()*A.length];return s;}
const BC_OK=(typeof BroadcastChannel!=="undefined");

function makeMockTransport({room,selfId,onEvent,onReady}){
  if(!BC_OK)return {send(){},close(){},offline:true};
  const ch=new BroadcastChannel("jabmoo-"+room);
  ch.onmessage=e=>{const m=e.data;if(m&&m.from!==selfId)onEvent(m);};
  if(onReady)setTimeout(onReady,0);
  return {
    send(type,payload){try{ch.postMessage({type,from:selfId,payload,t:Date.now()});}catch(_){}},
    close(){try{ch.close();}catch(_){}},
    offline:false
  };
}

// Lazy-load the supabase-js v2 UMD SDK by injecting a <script> tag.
// (UMD sets window.supabase; safer than dynamic import() under Babel-standalone.)
let _sbModPromise=null;
function loadSupabase(){
  if(typeof window!=="undefined"&&window.supabase&&window.supabase.createClient)
    return Promise.resolve(window.supabase);
  if(_sbModPromise)return _sbModPromise;
  const urls=["https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2","https://unpkg.com/@supabase/supabase-js@2"];
  _sbModPromise=new Promise((resolve,reject)=>{
    let i=0;
    (function tryNext(){
      if(i>=urls.length){reject(new Error("โหลด Supabase SDK ไม่สำเร็จ (CDN ถูกบล็อก?)"));return;}
      const s=document.createElement("script");
      s.src=urls[i++];s.async=true;
      s.onload=()=>{if(window.supabase&&window.supabase.createClient)resolve(window.supabase);else tryNext();};
      s.onerror=()=>tryNext();
      document.head.appendChild(s);
    })();
  });
  return _sbModPromise;
}

function makeSupabaseTransport({room,selfId,onEvent,url,key,onReady,onError}){
  const t={ready:false,offline:false,_ch:null,_client:null,
    send(type,payload){if(this._ch&&this.ready){try{this._ch.send({type:"broadcast",event:"msg",payload:{type,from:selfId,payload,t:Date.now()}});}catch(_){}}},
    close(){try{if(this._client&&this._ch)this._client.removeChannel(this._ch);}catch(_){}}
  };
  (async()=>{
    try{
      const mod=await loadSupabase();
      const client=mod.createClient(url,key,{realtime:{params:{eventsPerSecond:20}}});
      t._client=client;
      const ch=client.channel("jabmoo-"+room,{config:{broadcast:{self:false}}});
      ch.on("broadcast",{event:"msg"},(m)=>{const d=m&&m.payload;if(d&&d.from!==selfId)onEvent(d);});
      ch.subscribe((status)=>{
        if(status==="SUBSCRIBED"){t.ready=true;if(onReady)onReady();}
        else if(status==="CHANNEL_ERROR"||status==="TIMED_OUT"||status==="CLOSED"){if(onError)onError(status);}
      });
      t._ch=ch;
    }catch(e){t.offline=true;if(onError)onError(e&&e.message?e.message:"connect error");}
  })();
  return t;
}

  const [msg,setMsg]=useState("");

  function broadcastRoomState(seatsX,membersX){

  }
  function addSys(text){setChat(c=>[...c,{sys:true,text,ts:Date.now()}]);}

  function mutateSeatAsHost(type,fromId,payload){
    const fromName=ref.current.members[fromId]||"?";
    let sx=ref.current.seats.slice();
    if(type==="takeSeat"){
      const idx=payload.seatIdx;
      if(sx[idx].type!=="empty")return;
      sx=sx.map(s=>s.type==="human"&&s.id===fromId?{type:"empty"}:s);
      sx[idx]={type:"human",id:fromId,name:fromName};
    } else if(type==="leaveSeat"){
      sx=sx.map(s=>s.type==="human"&&s.id===fromId?{type:"empty"}:s);
    }
    ref.current.seats=sx;setSeats(sx);broadcastRoomState(sx,ref.current.members);
  }

  function handleEvent(m){
    const meHost=ref.current.hostId===selfId;
    if(m.type==="hello"){
      setMembers(prev=>{
        const nx={...prev,[m.from]:m.payload.name};
        ref.current.members=nx;
        if(meHost){broadcastRoomState(ref.current.seats,nx);addSys(m.payload.name+(L?" เข้าห้อง":" joined"));}
        return nx;
      });
    } else if(m.type==="roomState"){
      setHostId(m.payload.hostId);
      setSeats(m.payload.seats);
      setMembers(m.payload.members||{});
      ref.current.hostId=m.payload.hostId;ref.current.seats=m.payload.seats;ref.current.members=m.payload.members||{};
    } else if(m.type==="chat"){
      setChat(c=>[...c,m.payload]);
    } else if(m.type==="bye"){
      if(meHost){
        setMembers(prev=>{
          const nx={...prev};const leftName=nx[m.from];delete nx[m.from];
          const sx=ref.current.seats.map(s=>s.type==="human"&&s.id===m.from?{type:"empty"}:s);
          ref.current.members=nx;ref.current.seats=sx;setSeats(sx);broadcastRoomState(sx,nx);
          if(leftName)addSys(leftName+(L?" ออกจากห้อง":" left"));

        });

    } else if(m.type==="gchat"){
      if(gameOnState._chatCb)gameOnState._chatCb(m.payload);
      if(ref.current.hostId===selfId&&tx.current)tx.current.send("gchat",m.payload);
    } else if(m.type==="gemote"){
      if(gameOnState._emoteCb)gameOnState._emoteCb(m.payload);
      if(ref.current.hostId===selfId&&tx.current)tx.current.send("gemote",m.payload);
    } else if(m.type==="start"){
      const seatsX=m.payload.seats;
      const meSeat=seatsX.findIndex(s=>s.type==="human"&&s.id===selfId);
      if(meSeat<0)return;

        sendEmote:(m)=>{if(tx.current)tx.current.send("gemote",m);},
        bindEmote:(fn)=>{gameOnState._emoteCb=fn;}});

  function openTx(roomCode,onReadyCb){

  function takeSeat(idx){
    if(isHost)mutateSeatAsHost("takeSeat",selfId,{seatIdx:idx});
    else if(tx.current)tx.current.send("takeSeat",{seatIdx:idx});
  }
  function leaveSeat(){

  }

  const connBadge=(()=>{
    if(connKind==="mock")return {t:(L?"โหมดแท็บเดียวกัน":"Same-browser"),c:"#6b7280",bg:"#f3f4f6"};
    if(conn==="connecting")return {t:(L?"กำลังเชื่อมต่อ…":"Connecting…"),c:"#b45309",bg:"#fef3c7"};
    if(conn==="connected")return {t:(L?"เชื่อมต่อแล้ว":"Connected"),c:"#16a34a",bg:"#dcfce7"};
    if(conn==="error")return {t:(L?"เชื่อมต่อล้มเหลว":"Connection failed"),c:"#dc2626",bg:"#fee2e2"};
    return {t:"…",c:"#6b7280",bg:"#f3f4f6"};
  })();

  return (
    <div style={OWRAP}>
      <div style={{...OCARD,maxWidth:460}}>
        <div style={OHEAD}>
          <div style={OTITLE}>🐷 {L?"ห้องเล่น":"Lobby"}</div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <span style={{fontSize:11,fontWeight:700,color:connBadge.c,background:connBadge.bg,borderRadius:6,padding:"3px 8px"}}>{connBadge.t}</span>
            <button onClick={fsToggle} style={SS}>⛶</button>
            <button onClick={onBack} style={SS}>{L?"ออก":"Leave"}</button>
          </div>
        </div>

        {conn==="error"&&<div style={{background:"#fee2e2",border:"1px solid #fecaca",borderRadius:8,padding:"7px 10px",marginBottom:10,fontSize:12,color:"#b91c1c"}}>{connErr}</div>}

        <div onClick={copyCode} style={{background:"#eff6ff",border:"1.5px solid #3b82f6",borderRadius:12,padding:"10px 14px",marginBottom:12,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:11,color:"#6b7280"}}>{L?"โค้ดห้อง (แตะเพื่อคัดลอก)":"Room code (tap to copy)"}</div>
            <div style={{fontSize:30,fontWeight:800,letterSpacing:6,color:"#1e3a5f",fontFamily:"Georgia,serif"}}>{room}</div>
          </div>
          <div style={{fontSize:13,color:copied?"#16a34a":"#3b82f6",fontWeight:700}}>{copied?(L?"คัดลอกแล้ว":"Copied"):"📋"}</div>
        </div>

        <div style={{fontSize:12,color:"#6b7280",fontWeight:600,marginBottom:6}}>{L?"ที่นั่ง":"Seats"} ({seatedHumans} {L?"คน":"players"})</div>
        {seats.map((s,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:8,background:"#f9fafb",border:"1px solid #e5e7eb",borderRadius:10,padding:"8px 10px",marginBottom:6}}>
            <span style={{width:20,fontSize:13,fontWeight:700,color:"#9ca3af"}}>{i+1}</span>
            <div style={{flex:1,fontSize:14,minWidth:0}}>
              {s.type==="human"&&<span style={{fontWeight:700,color:"#1e3a5f"}}>{s.name}{s.id===selfId?(L?" (คุณ)":" (you)"):""}{s.id===hostId?" 👑":""}</span>}
              {s.type==="bot"&&<span style={{fontWeight:600,color:"#7c3aed"}}>🤖 Bot Lv{s.level}</span>}
              {s.type==="empty"&&<span style={{color:"#9ca3af"}}>{L?"ว่าง":"empty"}</span>}
            </div>
            {s.type==="empty"&&mySeatIdx<0&&<button onClick={()=>takeSeat(i)} style={{...SS,borderColor:"#3b82f6",color:"#2563eb"}}>{L?"นั่งตรงนี้":"Sit"}</button>}
            {s.type==="empty"&&isHost&&<button onClick={()=>setBotSeat(i,true)} style={SS}>+ Bot</button>}
            {s.type==="human"&&s.id===selfId&&<button onClick={leaveSeat} style={{...SS,color:"#dc2626"}}>{L?"ลุก":"Stand"}</button>}
            {s.type==="bot"&&isHost&&(
              <span style={{display:"flex",gap:6}}>
                <select value={s.level} onChange={e=>setBotLevel(i,+e.target.value)} style={SS}><option value={1}>Lv1</option><option value={2}>Lv2</option></select>
                <button onClick={()=>setBotSeat(i,false)} style={{...SS,color:"#dc2626"}}>✕</button>
              </span>
            )}
          </div>
        ))}

        <div style={{fontSize:12,color:"#6b7280",fontWeight:600,margin:"10px 0 6px"}}>💬 {L?"แชต":"Chat"}</div>
        <div ref={chatBox} style={{height:150,overflowY:"auto",background:"#f9fafb",border:"1px solid #e5e7eb",borderRadius:10,padding:8,marginBottom:8}}>
          {chat.length===0&&<div style={{fontSize:12,color:"#9ca3af",textAlign:"center",marginTop:50}}>{L?"ยังไม่มีข้อความ":"No messages yet"}</div>}
          {chat.map((c,i)=>(
            c.sys
            ? <div key={i} style={{fontSize:11,color:"#9ca3af",textAlign:"center",margin:"3px 0"}}>— {c.text} —</div>
            : <div key={i} style={{marginBottom:4,fontSize:13,wordBreak:"break-word"}}><span style={{fontWeight:700,color:c.id===selfId?"#2563eb":"#1e3a5f"}}>{c.name}:</span> <span style={{color:"#374151"}}>{c.text}</span></div>
          ))}
        </div>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <input value={msg} onChange={e=>setMsg(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")sendChat();}} placeholder={L?"พิมพ์ข้อความ...":"Type a message..."} style={{...OINP,flex:1}}/>
          <button onClick={sendChat} style={{...OBTN2,width:"auto",padding:"0 16px"}}>{L?"ส่ง":"Send"}</button>
        </div>

        {isHost
          ? <button onClick={startGame} disabled={!canStart} style={{...OBTN,opacity:canStart?1:0.5,cursor:canStart?"pointer":"default"}}>{L?"เริ่มเกม!":"Start Game!"}{allFilled?"":" ("+(L?"ที่นั่งยังไม่เต็ม":"seats not full")+")"}</button>
          : <div style={{textAlign:"center",fontSize:13,color:"#6b7280",padding:10}}>{L?"รอโฮสต์เริ่มเกม…":"Waiting for host to start…"}</div>}
      </div>
    </div>
  );
}


// ── ROOT ───────────────────────────────────────────────────────
function App(){
  const [lang,setLang]=useState("th");
  const [cfg,setCfg]=useState(null);
  const [online,setOnline]=useState(false);
  if(online)return <OnlineLobby lang={lang} setLang={setLang} onBack={()=>setOnline(false)} onStartGame={(lobby)=>{const seatStr=lobby.seats.map((s,i)=>(i+1)+":"+(s.type==="human"?s.name:s.type==="bot"?"Bot":"-")).join("   ");alert((lang==="th"?"พร้อมเริ่ม! ขั้นถัดไปจะต่อเกมจริงผ่านเน็ตเวิร์ก\nที่นั่ง  ":"Ready! Next step wires the live networked game\nSeats  ")+seatStr);}}/>;
  if(!cfg)return <Setup onStart={c=>setCfg(c)} onOnline={()=>setOnline(true)} lang={lang} setLang={setLang}/>;
  return <Game cfg={cfg} lang={lang} setLang={setLang}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
